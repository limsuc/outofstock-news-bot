name: Out-of-stock alert

on:
  schedule:
    # 17:03-17:43 KST = 08:03-08:43 UTC.
    # Frequent checks keep delivery close to 17:00 even if GitHub drops a slot.
    - cron: "3,8,13,18,23,28,33,38,43 8 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send even if the current alert was already sent"
        required: false
        default: false
        type: boolean

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID || '569967356' }}
      OUTOFSTOCK_FILE_ID: ${{ secrets.OUTOFSTOCK_FILE_ID || vars.OUTOFSTOCK_FILE_ID }}
      OUTOFSTOCK_URL: ${{ secrets.OUTOFSTOCK_URL || vars.OUTOFSTOCK_URL }}
      SALES_LIST_FILE_ID: ${{ secrets.SALES_LIST_FILE_ID || vars.SALES_LIST_FILE_ID || '1ZZOH5A3AzDcHEyzoOx43KwSVxeLk5XXE' }}
      SALES_LIST_URL: ${{ secrets.SALES_LIST_URL || vars.SALES_LIST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore alert history
        uses: actions/cache@v4
        with:
          path: data/alerts.sqlite3
          key: outofstock-alert-db-${{ github.run_id }}
          restore-keys: |
            outofstock-alert-db-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required settings
        run: |
          missing=0
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Missing Telegram bot token secret"
            missing=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Missing Telegram chat id secret"
            missing=1
          fi
          if [ -z "$SALES_LIST_FILE_ID" ] && [ -z "$SALES_LIST_URL" ]; then
            echo "Missing sales list file id or sales list URL secret"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Send Telegram alert
        run: |
          if [ "${{ github.event.inputs.force_send }}" = "true" ]; then
            python outofstock_alert.py --send --force-send
          else
            python outofstock_alert.py --send
          fi

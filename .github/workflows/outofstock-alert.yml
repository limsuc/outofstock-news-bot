name: Out-of-stock alert

on:
  schedule:
    # 17:13 KST = 08:13 UTC. Avoid the top-of-hour Actions queue.
    - cron: "13 8 * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OUTOFSTOCK_FILE_ID: ${{ secrets.OUTOFSTOCK_FILE_ID }}
      OUTOFSTOCK_URL: ${{ secrets.OUTOFSTOCK_URL }}
      SALES_LIST_FILE_ID: ${{ secrets.SALES_LIST_FILE_ID }}
      SALES_LIST_URL: ${{ secrets.SALES_LIST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore alert history
        uses: actions/cache@v4
        with:
          path: data/alerts.sqlite3
          key: outofstock-alert-db-${{ github.run_id }}
          restore-keys: |
            outofstock-alert-db-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required settings
        run: |
          missing=0
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN"
            missing=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Missing TELEGRAM_CHAT_ID"
            missing=1
          fi
          if [ -z "$SALES_LIST_FILE_ID" ] && [ -z "$SALES_LIST_URL" ]; then
            echo "Missing SALES_LIST_FILE_ID or SALES_LIST_URL"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Send Telegram alert
        run: python outofstock_alert.py --send
